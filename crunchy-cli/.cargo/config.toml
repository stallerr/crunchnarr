# Cross-compilation targets for crunchy-cli

[build]
# Default to native compilation
# target = "aarch64-apple-darwin"

[target.aarch64-apple-darwin]
# macOS ARM64 (Apple Silicon)

[target.x86_64-apple-darwin]
# macOS x86_64 (Intel)

[target.x86_64-unknown-linux-gnu]
# Linux x86_64
# linker = "x86_64-unknown-linux-gnu-gcc"

[target.x86_64-unknown-linux-musl]
# Linux x86_64 (static)
# linker = "x86_64-unknown-linux-musl-gcc"

# Profile settings
[profile.release]
lto = true
codegen-units = 1
panic = "abort"
strip = true

[profile.dev]
# Faster dev builds
opt-level = 0
debug = true
